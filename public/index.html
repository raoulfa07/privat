<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charleen & Raoul · Erinnerungsrundgang</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --ink: #211f1d;
    --muted: #716d66;
    --paper: #fbf8f1;
    --soft: #f1eadc;
    --line: rgba(33, 31, 29, 0.13);
    --rose: #d95f76;
    --aqua: #247f87;
    --white: #fffdf8;
    --night: #10151b;
    --shadow: 0 18px 50px rgba(16, 21, 27, 0.18);
    --radius: 8px;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button, input, textarea, select { font: inherit; }
  button { cursor: pointer; }

  .app {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 350px minmax(0, 1fr);
  }

  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: auto;
    padding: 26px;
    background: var(--white);
    border-right: 1px solid var(--line);
  }

  .brand {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 24px;
  }

  .brand h1 {
    margin: 0;
    font-size: 31px;
    line-height: 0.98;
    letter-spacing: 0;
  }

  .live {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 99px;
    background: #c28d2e;
  }

  .dot.on { background: #607848; box-shadow: 0 0 0 4px rgba(96, 120, 72, 0.13); }

  .search, .memory-form {
    display: grid;
    gap: 10px;
  }

  .search { margin-bottom: 18px; }

  input, textarea, select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
    padding: 12px 13px;
    outline: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: rgba(36, 127, 135, 0.48);
    box-shadow: 0 0 0 3px rgba(36, 127, 135, 0.12);
  }

  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 5px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--soft);
    margin-bottom: 22px;
  }

  .tabs button {
    min-height: 36px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
  }

  .tabs button.active {
    color: var(--ink);
    background: var(--white);
    box-shadow: 0 4px 14px rgba(33, 31, 29, 0.09);
  }

  .tour-controls {
    display: grid;
    gap: 8px;
    padding: 16px 0 20px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }

  .primary, .secondary {
    border-radius: var(--radius);
    min-height: 42px;
    font-weight: 700;
  }

  .primary {
    border: 0;
    color: white;
    background: var(--aqua);
  }

  .secondary {
    border: 1px solid var(--line);
    color: var(--ink);
    background: var(--white);
  }

  .memory-form {
    padding-top: 4px;
  }

  .memory-form h2 {
    margin: 0 0 3px;
    font-size: 18px;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .dropzone {
    display: grid;
    place-items: center;
    min-height: 112px;
    border: 1px dashed rgba(36, 127, 135, 0.5);
    border-radius: var(--radius);
    color: var(--aqua);
    background: rgba(36, 127, 135, 0.06);
    text-align: center;
    padding: 16px;
  }

  .dropzone strong { display: block; color: var(--ink); margin-bottom: 5px; }
  .dropzone input { display: none; }

  .main { min-width: 0; padding: 28px; }

  .stage {
    position: relative;
    min-height: min(86vh, 880px);
    overflow: hidden;
    border-radius: var(--radius);
    background: radial-gradient(circle at 50% 40%, #263947, #111820 58%, #070a0f);
    box-shadow: var(--shadow);
  }

  #globeStage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: grab;
    touch-action: none;
  }

  #globeStage.dragging { cursor: grabbing; }

  .stage-copy {
    position: absolute;
    left: 34px;
    bottom: 34px;
    z-index: 4;
    width: min(720px, calc(100% - 68px));
    color: white;
    pointer-events: none;
  }

  .stage-copy h2 {
    margin: 10px 0 14px;
    font-size: clamp(38px, 6.8vw, 86px);
    line-height: 0.94;
    letter-spacing: 0;
  }

  .kicker {
    width: fit-content;
    padding: 7px 10px;
    border: 1px solid rgba(255, 253, 248, 0.22);
    border-radius: 999px;
    color: rgba(255, 253, 248, 0.82);
    background: rgba(255, 253, 248, 0.08);
    backdrop-filter: blur(10px);
  }

  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .stat {
    display: inline-flex;
    gap: 8px;
    align-items: baseline;
    padding: 8px 11px;
    border-radius: 999px;
    color: var(--ink);
    background: rgba(255, 253, 248, 0.9);
  }

  .stat b { color: var(--rose); }

  .hud {
    position: absolute;
    right: 24px;
    top: 24px;
    z-index: 5;
    display: grid;
    gap: 10px;
    width: min(320px, calc(100% - 48px));
  }

  .hud-card, .station {
    border: 1px solid rgba(255, 253, 248, 0.18);
    border-radius: var(--radius);
    color: white;
    background: rgba(16, 21, 27, 0.62);
    backdrop-filter: blur(16px);
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
  }

  .hud-card { padding: 14px; }
  .hud-card strong { display: block; margin-bottom: 4px; }
  .hud-card span { color: rgba(255, 253, 248, 0.72); font-size: 13px; }

  .zoom-row {
    display: grid;
    grid-template-columns: 36px 1fr 36px;
    align-items: center;
    gap: 9px;
    margin-top: 12px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(255, 253, 248, 0.22);
    border-radius: 6px;
    color: white;
    background: rgba(255,255,255,0.08);
  }

  .zoom-row input { accent-color: var(--aqua); }

  .station {
    position: absolute;
    z-index: 6;
    left: 34px;
    top: 34px;
    width: min(430px, calc(100% - 68px));
    max-height: calc(100% - 68px);
    overflow: auto;
    padding: 18px;
    display: none;
  }

  .station.active { display: block; }
  .station h3 { margin: 0 0 8px; font-size: 26px; }
  .station p { color: rgba(255, 253, 248, 0.76); line-height: 1.45; }
  .station-image { width: 100%; max-height: 280px; object-fit: cover; border-radius: var(--radius); margin-bottom: 12px; }
  .station-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }

  .mini-map {
    overflow: hidden;
    border-radius: var(--radius);
    border: 1px solid rgba(255, 253, 248, 0.18);
    margin-top: 12px;
  }

  .mini-map iframe {
    display: block;
    width: 100%;
    height: 220px;
    border: 0;
  }

  .views { display: none; margin-top: 22px; }
  .views.active { display: block; }

  .memory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
    gap: 16px;
  }

  .card, .moment-card {
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--white);
    box-shadow: 0 10px 28px rgba(47, 57, 68, 0.08);
  }

  .thumb {
    aspect-ratio: 4 / 3;
    background: linear-gradient(135deg, rgba(217, 95, 118, 0.17), rgba(36, 127, 135, 0.16));
    display: grid;
    place-items: center;
    color: var(--muted);
    overflow: hidden;
  }

  .thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .card:hover .thumb img { transform: scale(1.06); }
  .card-body { padding: 14px; display: grid; gap: 8px; }
  .card h3 { margin: 0; font-size: 18px; }
  .meta { display: flex; flex-wrap: wrap; gap: 7px; color: var(--muted); font-size: 13px; }
  .tag { display: inline-flex; padding: 4px 7px; border-radius: 999px; color: var(--night); background: var(--soft); font-size: 12px; }
  .note { color: var(--muted); line-height: 1.45; }

  .timeline { position: relative; max-width: 880px; margin: 0 auto; }
  .timeline::before { content: ""; position: absolute; left: 18px; top: 0; bottom: 0; width: 2px; background: var(--line); }
  .moment { position: relative; display: grid; grid-template-columns: 46px minmax(0, 1fr); gap: 16px; margin-bottom: 18px; }
  .moment-dot { width: 38px; height: 38px; border: 7px solid var(--paper); border-radius: 50%; background: var(--aqua); z-index: 1; }
  .moment-card { padding: 17px; }

  .empty {
    padding: 52px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    background: var(--white);
  }

  @media (max-width: 920px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; order: 2; }
    .main { order: 1; padding: 18px; }
    .stage { min-height: 690px; }
    .stage-copy { left: 20px; bottom: 20px; width: calc(100% - 40px); }
    .hud { left: 20px; right: 20px; top: 20px; width: auto; }
    .station { left: 20px; top: 150px; width: calc(100% - 40px); }
    .station-actions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>Charleen<br>& Raoul</h1>
      <span class="live"><span class="dot" id="liveDot"></span><span id="liveText">offline</span></span>
    </div>

    <div class="search">
      <input id="searchInput" type="search" placeholder="Orte, Daten, Bilder, Notizen suchen">
      <select id="typeFilter" aria-label="Erinnerungstyp filtern">
        <option value="all">Alles anzeigen</option>
        <option value="photo">Bilder</option>
        <option value="chat">Chats & Screenshots</option>
        <option value="note">Notizen</option>
        <option value="place">Orte</option>
      </select>
    </div>

    <nav class="tabs" aria-label="Ansichten">
      <button class="active" data-view="world">Welt</button>
      <button data-view="gallery">Bilder</button>
      <button data-view="timeline">Zeit</button>
    </nav>

    <div class="tour-controls">
      <button class="primary" id="startTour" type="button">Rundgang starten</button>
      <button class="secondary" id="resetWorld" type="button">Zur Weltkugel</button>
    </div>

    <form class="memory-form" id="memoryForm">
      <h2>Neue Erinnerung</h2>
      <input name="title" placeholder="Titel">
      <div class="form-grid">
        <input name="date" type="date">
        <select name="type">
          <option value="photo">Bild</option>
          <option value="chat">Chat</option>
          <option value="note">Notiz</option>
          <option value="place">Ort</option>
        </select>
      </div>
      <input name="place" placeholder="Ort, z. B. Münster">
      <div class="form-grid">
        <input name="lat" inputmode="decimal" placeholder="Breite">
        <input name="lng" inputmode="decimal" placeholder="Laenge">
      </div>
      <input name="tags" placeholder="Tags, durch Komma getrennt">
      <textarea name="note" rows="4" placeholder="Was soll hier nicht verloren gehen?"></textarea>
      <label class="dropzone" id="dropzone">
        <input id="fileInput" name="files" type="file" multiple accept="image/*,.heic,.heif,.pdf,.txt">
        <span><strong>Bilder oder Screenshots hochladen</strong><span id="fileLabel">Dateien hier ablegen oder auswaehlen</span></span>
      </label>
      <button class="primary" type="submit">Erinnerung speichern</button>
    </form>
  </aside>

  <main class="main">
    <section class="stage" id="worldView">
      <canvas id="globeStage" aria-label="Interaktive Weltkugel"></canvas>
      <div class="hud">
        <div class="hud-card">
          <strong id="hudTitle">Welt der Erinnerungen</strong>
          <span id="hudSub">Ziehen zum Drehen, scrollen zum Zoomen, Pin anklicken zum Reisen.</span>
          <div class="zoom-row">
            <button class="icon-btn" id="zoomOut" type="button" aria-label="Herauszoomen">−</button>
            <input id="zoomRange" type="range" min="2.25" max="10.5" value="6.2" step="0.1" aria-label="Zoom">
            <button class="icon-btn" id="zoomIn" type="button" aria-label="Hineinzoomen">+</button>
          </div>
        </div>
      </div>

      <article class="station" id="stationPanel"></article>

      <div class="stage-copy" id="stageCopy">
        <div class="kicker">Interaktiver Jahrestags-Rundgang</div>
        <h2>Von der Erde direkt in eure Momente.</h2>
        <div class="stats" id="stats"></div>
      </div>
    </section>

    <section class="views" id="galleryView">
      <div class="memory-grid" id="memoryGrid"></div>
    </section>

    <section class="views" id="timelineView">
      <div class="timeline" id="timeline"></div>
    </section>
  </main>
</div>

<script type="module">
import * as THREE from "./assets/three.module.js";

const state = {
  memories: [],
  filtered: [],
  selectedId: null,
  tourIndex: -1,
  isDragging: false,
  downPointer: null,
  lastPointer: null,
  targetDistance: 6.2,
  cameraDistance: 6.2,
  targetQuaternion: new THREE.Quaternion(),
  globeQuaternion: new THREE.Quaternion(),
  autoRotate: true,
  pins: [],
  raycaster: new THREE.Raycaster(),
  pointer: new THREE.Vector2(),
};

const el = (id) => document.getElementById(id);
const imageFile = (memory) => (memory.files || []).find((file) => file.mime && (file.mime.startsWith("image/") || [".heic", ".heif"].some((ext) => file.name.toLowerCase().endsWith(ext))));
const imageUrl = (file) => file ? (file.previewUrl || file.url) : "";
const fmtDate = (date) => date ? new Intl.DateTimeFormat("de-DE", { dateStyle: "medium" }).format(new Date(`${date}T12:00:00`)) : "ohne Datum";

const knownPlaces = {
  berlin: { lat: 52.52, lng: 13.405 },
  hamburg: { lat: 53.5511, lng: 9.9937 },
  muenster: { lat: 51.9607, lng: 7.6261 },
  münster: { lat: 51.9607, lng: 7.6261 },
  muenchen: { lat: 48.1372, lng: 11.5755 },
  münchen: { lat: 48.1372, lng: 11.5755 },
  koeln: { lat: 50.9375, lng: 6.9603 },
  köln: { lat: 50.9375, lng: 6.9603 },
  duesseldorf: { lat: 51.2277, lng: 6.7735 },
  düsseldorf: { lat: 51.2277, lng: 6.7735 },
  frankfurt: { lat: 50.1109, lng: 8.6821 },
};

function escapeHtml(value) {
  return String(value || "").replace(/[&<>"']/g, (char) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[char]));
}

function memoryGeo(memory) {
  if (Number.isFinite(memory.lat) && Number.isFinite(memory.lng)) return { lat: memory.lat, lng: memory.lng, approximate: false };
  const known = knownPlaces[String(memory.place || "").toLowerCase().trim()];
  if (known) return { ...known, approximate: false };
  return { lat: 0, lng: 0, approximate: true };
}

function latLngVector(lat, lng, radius = 2.05) {
  const latRad = THREE.MathUtils.degToRad(lat);
  const lngRad = THREE.MathUtils.degToRad(lng);
  return new THREE.Vector3(
    radius * Math.cos(latRad) * Math.sin(lngRad),
    radius * Math.sin(latRad),
    radius * Math.cos(latRad) * Math.cos(lngRad)
  );
}

function cityMapEmbed(memory) {
  const geo = memoryGeo(memory);
  if (geo.approximate) return "";
  const lat = Number(geo.lat);
  const lng = Number(geo.lng);
  const delta = 0.018;
  const bbox = [(lng - delta).toFixed(5), (lat - delta).toFixed(5), (lng + delta).toFixed(5), (lat + delta).toFixed(5)].join(",");
  const marker = `${lat.toFixed(5)},${lng.toFixed(5)}`;
  return `https://www.openstreetmap.org/export/embed.html?bbox=${encodeURIComponent(bbox)}&layer=mapnik&marker=${encodeURIComponent(marker)}`;
}

const canvas = el("globeStage");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
const globeGroup = new THREE.Group();
scene.add(globeGroup);

scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const sun = new THREE.DirectionalLight(0xffffff, 2.2);
sun.position.set(-4, 3, 5);
scene.add(sun);

const loader = new THREE.TextureLoader();
const earthTexture = loader.load("/assets/earth-day.jpg");
earthTexture.colorSpace = THREE.SRGBColorSpace;

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(2, 96, 96),
  new THREE.MeshStandardMaterial({
    map: earthTexture,
    roughness: 0.82,
    metalness: 0.02,
  })
);
globeGroup.add(earth);

const atmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(2.035, 96, 96),
  new THREE.MeshBasicMaterial({
    color: 0x83dff2,
    transparent: true,
    opacity: 0.12,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
  })
);
globeGroup.add(atmosphere);

const stars = new THREE.Points(
  new THREE.BufferGeometry().setAttribute("position", new THREE.Float32BufferAttribute(
    Array.from({ length: 900 }, () => THREE.MathUtils.randFloatSpread(80)), 3
  )),
  new THREE.PointsMaterial({ color: 0xffffff, size: 0.018, transparent: true, opacity: 0.48 })
);
scene.add(stars);

function resizeRenderer() {
  const rect = canvas.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height, false);
  camera.aspect = rect.width / rect.height;
  camera.updateProjectionMatrix();
}

function setView(view) {
  document.querySelectorAll(".tabs button").forEach((button) => button.classList.toggle("active", button.dataset.view === view));
  document.querySelectorAll(".views").forEach((section) => section.classList.remove("active"));
  if (view !== "world") el(`${view}View`).classList.add("active");
  el("worldView").style.display = view === "world" ? "block" : "none";
}

async function loadMemories() {
  const q = encodeURIComponent(el("searchInput").value.trim());
  const type = encodeURIComponent(el("typeFilter").value);
  const response = await fetch(`/api/memories?q=${q}&type=${type}`);
  state.memories = await response.json();
  state.filtered = state.memories;
  render();
}

function connectEvents() {
  if (location.hostname.includes("netlify.app")) {
    el("liveDot").classList.add("on");
    el("liveText").textContent = "online";
    return;
  }
  const stream = new EventSource("/events");
  stream.onopen = () => {
    el("liveDot").classList.add("on");
    el("liveText").textContent = "live";
  };
  stream.onerror = () => {
    el("liveDot").classList.remove("on");
    el("liveText").textContent = "verbindet";
  };
  stream.addEventListener("init", loadMemories);
  stream.addEventListener("memoriesUpdated", loadMemories);
}

function render() {
  renderStats();
  renderGallery();
  renderTimeline();
  renderPins();
  updateHud();
}

function renderStats() {
  const images = state.filtered.reduce((sum, memory) => sum + (memory.files || []).filter((file) => file.mime.startsWith("image/")).length, 0);
  const places = new Set(state.filtered.map((memory) => memory.place).filter(Boolean)).size;
  el("stats").innerHTML = `
    <span class="stat"><b>${state.filtered.length}</b> Erinnerungen</span>
    <span class="stat"><b>${images}</b> Bilder</span>
    <span class="stat"><b>${places}</b> Orte</span>
  `;
}

function renderGallery() {
  if (!state.filtered.length) {
    el("memoryGrid").innerHTML = `<div class="empty">Noch nichts gefunden. Lade die erste Erinnerung hoch oder aendere die Suche.</div>`;
    return;
  }
  el("memoryGrid").innerHTML = state.filtered.map((memory) => {
    const img = imageFile(memory);
    return `
      <article class="card" data-memory="${memory.id}">
        <div class="thumb">${img ? `<img src="${imageUrl(img)}" alt="${escapeHtml(memory.title)}">` : "Noch kein Bild"}</div>
        <div class="card-body">
          <h3>${escapeHtml(memory.title)}</h3>
          <div class="meta"><span>${fmtDate(memory.date)}</span><span>${escapeHtml(memory.place)}</span></div>
          <div>${(memory.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join(" ")}</div>
          <p class="note">${escapeHtml(memory.note).slice(0, 170)}</p>
        </div>
      </article>
    `;
  }).join("");
  document.querySelectorAll(".card[data-memory]").forEach((card) => {
    card.addEventListener("click", () => goToMemory(card.dataset.memory, { openStation: true }));
  });
}

function renderTimeline() {
  if (!state.filtered.length) {
    el("timeline").innerHTML = `<div class="empty">Die Zeitleiste fuellt sich mit euren Erinnerungen.</div>`;
    return;
  }
  el("timeline").innerHTML = state.filtered.map((memory) => `
    <article class="moment" data-memory="${memory.id}">
      <div class="moment-dot"></div>
      <div class="moment-card">
        <div class="meta">${fmtDate(memory.date)} · ${escapeHtml(memory.place)}</div>
        <h3>${escapeHtml(memory.title)}</h3>
        <p class="note">${escapeHtml(memory.note)}</p>
      </div>
    </article>
  `).join("");
  document.querySelectorAll(".moment[data-memory]").forEach((item) => {
    item.addEventListener("click", () => goToMemory(item.dataset.memory, { openStation: true }));
  });
}

function pinMaterial(selected = false) {
  return new THREE.MeshBasicMaterial({ color: selected ? 0xff6f8a : 0xfffdf8 });
}

function renderPins() {
  state.pins.forEach((pin) => globeGroup.remove(pin));
  state.pins = [];
  state.filtered.forEach((memory) => {
    const geo = memoryGeo(memory);
    const marker = new THREE.Mesh(new THREE.SphereGeometry(memory.id === state.selectedId ? 0.055 : 0.038, 20, 20), pinMaterial(memory.id === state.selectedId));
    marker.position.copy(latLngVector(geo.lat, geo.lng, 2.08));
    marker.userData.memoryId = memory.id;
    state.pins.push(marker);
    globeGroup.add(marker);
  });
}

function updateHud() {
  const memory = state.memories.find((item) => item.id === state.selectedId);
  if (!memory) {
    el("hudTitle").textContent = "Welt der Erinnerungen";
    el("hudSub").textContent = "Ziehen zum Drehen, scrollen zum Zoomen, Pin anklicken zum Reisen.";
    return;
  }
  el("hudTitle").textContent = memory.title;
  el("hudSub").textContent = `${fmtDate(memory.date)} · ${memory.place || "Ort offen"}`;
}

function globeQuaternionFor(lat, lng) {
  const vector = latLngVector(lat, lng, 1).normalize();
  const target = new THREE.Vector3(0, 0, 1);
  return new THREE.Quaternion().setFromUnitVectors(vector, target);
}

function goToMemory(id, options = {}) {
  const memory = state.memories.find((item) => item.id === id);
  if (!memory) return;
  setView("world");
  state.selectedId = id;
  state.tourIndex = Math.max(0, state.filtered.findIndex((item) => item.id === id));
  const geo = memoryGeo(memory);
  state.targetQuaternion.copy(globeQuaternionFor(geo.lat, geo.lng));
  state.targetDistance = geo.approximate ? 4.2 : 2.65;
  state.autoRotate = false;
  el("zoomRange").value = state.targetDistance;
  renderPins();
  updateHud();
  if (options.openStation) setTimeout(() => showStation(memory.id), 650);
}

function showStation(id) {
  const memory = state.memories.find((item) => item.id === id);
  if (!memory) return;
  const img = imageFile(memory);
  const mapUrl = cityMapEmbed(memory);
  el("stationPanel").innerHTML = `
    ${img ? `<img class="station-image" src="${imageUrl(img)}" alt="${escapeHtml(memory.title)}">` : ""}
    <h3>${escapeHtml(memory.title)}</h3>
    <div class="meta">${fmtDate(memory.date)} · ${escapeHtml(memory.place || "Ort offen")}</div>
    <p>${escapeHtml(memory.note || "Ein Moment, der hier seinen Platz bekommt.")}</p>
    ${mapUrl ? `<div class="mini-map"><iframe src="${mapUrl}" loading="lazy" title="Stadtkarte ${escapeHtml(memory.place)}"></iframe></div>` : ""}
    <div>${(memory.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join(" ")}</div>
    <div class="station-actions">
      <button class="secondary" id="prevMemory" type="button">Zurueck</button>
      <button class="primary" id="nextMemory" type="button">Weiter</button>
      <button class="secondary" id="closeStation" type="button">Welt</button>
    </div>
  `;
  el("stationPanel").classList.add("active");
  el("stageCopy").style.display = "none";
  el("prevMemory").addEventListener("click", previousMemory);
  el("nextMemory").addEventListener("click", nextMemory);
  el("closeStation").addEventListener("click", closeStation);
}

function closeStation() {
  el("stationPanel").classList.remove("active");
  el("stageCopy").style.display = "";
}

function nextMemory() {
  if (!state.filtered.length) return;
  const next = (state.tourIndex + 1) % state.filtered.length;
  goToMemory(state.filtered[next].id, { openStation: true });
}

function previousMemory() {
  if (!state.filtered.length) return;
  const prev = (state.tourIndex - 1 + state.filtered.length) % state.filtered.length;
  goToMemory(state.filtered[prev].id, { openStation: true });
}

function startTour() {
  if (!state.filtered.length) return;
  state.tourIndex = 0;
  goToMemory(state.filtered[0].id, { openStation: true });
}

function resetWorld() {
  closeStation();
  state.selectedId = null;
  state.tourIndex = -1;
  state.autoRotate = true;
  state.targetDistance = 6.2;
  state.targetQuaternion.identity();
  el("zoomRange").value = state.targetDistance;
  renderPins();
  updateHud();
  setView("world");
}

function pointerToNdc(event) {
  const rect = canvas.getBoundingClientRect();
  state.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  state.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
}

function pickPin(event) {
  pointerToNdc(event);
  state.raycaster.setFromCamera(state.pointer, camera);
  const hits = state.raycaster.intersectObjects(state.pins, false);
  if (hits[0]) goToMemory(hits[0].object.userData.memoryId, { openStation: true });
}

canvas.addEventListener("pointerdown", (event) => {
  state.isDragging = true;
  state.downPointer = { x: event.clientX, y: event.clientY };
  state.lastPointer = { x: event.clientX, y: event.clientY };
  state.autoRotate = false;
  canvas.classList.add("dragging");
  canvas.setPointerCapture(event.pointerId);
});

canvas.addEventListener("pointermove", (event) => {
  if (!state.isDragging || !state.lastPointer) return;
  const dx = event.clientX - state.lastPointer.x;
  const dy = event.clientY - state.lastPointer.y;
  state.lastPointer = { x: event.clientX, y: event.clientY };
  const yaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), dx * 0.006);
  const pitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), dy * 0.004);
  state.targetQuaternion.premultiply(yaw).premultiply(pitch).normalize();
});

canvas.addEventListener("pointerup", (event) => {
  const moved = state.downPointer ? Math.hypot(event.clientX - state.downPointer.x, event.clientY - state.downPointer.y) : 999;
  state.isDragging = false;
  state.downPointer = null;
  state.lastPointer = null;
  canvas.classList.remove("dragging");
  if (moved < 5) pickPin(event);
});

canvas.addEventListener("wheel", (event) => {
  event.preventDefault();
  state.autoRotate = false;
  state.targetDistance = THREE.MathUtils.clamp(state.targetDistance + event.deltaY * 0.006, 2.25, 10.5);
  el("zoomRange").value = state.targetDistance;
}, { passive: false });

function animate() {
  requestAnimationFrame(animate);
  resizeRenderer();
  if (state.autoRotate) {
    const spin = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), 0.002);
    state.targetQuaternion.premultiply(spin);
  }
  state.globeQuaternion.slerp(state.targetQuaternion, 0.075);
  globeGroup.quaternion.copy(state.globeQuaternion);
  state.cameraDistance += (state.targetDistance - state.cameraDistance) * 0.08;
  camera.position.set(0, 0, state.cameraDistance);
  camera.lookAt(0, 0, 0);
  stars.rotation.y += 0.0002;
  renderer.render(scene, camera);
}

function fieldValue(form, name) {
  return form.querySelector(`[name="${name}"]`)?.value || "";
}

async function imagePreviewFile(file) {
  if (!file.type.startsWith("image/") || file.type === "image/gif") return null;
  const image = new Image();
  const objectUrl = URL.createObjectURL(file);
  try {
    await new Promise((resolve, reject) => {
      image.onload = resolve;
      image.onerror = reject;
      image.src = objectUrl;
    });
    const maxSide = 1800;
    const scale = Math.min(1, maxSide / Math.max(image.naturalWidth, image.naturalHeight));
    const width = Math.max(1, Math.round(image.naturalWidth * scale));
    const height = Math.max(1, Math.round(image.naturalHeight * scale));
    const previewCanvas = document.createElement("canvas");
    previewCanvas.width = width;
    previewCanvas.height = height;
    previewCanvas.getContext("2d").drawImage(image, 0, 0, width, height);
    const blob = await new Promise((resolve) => previewCanvas.toBlob(resolve, "image/jpeg", 0.88));
    if (!blob) return null;
    return new File([blob], `${file.name.replace(/\.[^.]+$/, "") || "bild"}-preview.jpg`, { type: "image/jpeg" });
  } catch {
    return null;
  } finally {
    URL.revokeObjectURL(objectUrl);
  }
}

async function uploadFormData(form) {
  const data = new FormData();
  ["title", "date", "type", "place", "lat", "lng", "tags", "note"].forEach((name) => data.append(name, fieldValue(form, name)));
  const files = Array.from(el("fileInput").files || []);
  for (const file of files) {
    const preview = await imagePreviewFile(file);
    if (preview) data.append("files", preview);
    data.append("files", file);
  }
  return data;
}

document.querySelectorAll(".tabs button").forEach((button) => {
  button.addEventListener("click", () => setView(button.dataset.view));
});

el("startTour").addEventListener("click", startTour);
el("resetWorld").addEventListener("click", resetWorld);
el("searchInput").addEventListener("input", loadMemories);
el("typeFilter").addEventListener("change", loadMemories);
el("zoomRange").addEventListener("input", (event) => {
  state.autoRotate = false;
  state.targetDistance = Number(event.target.value);
});
el("zoomIn").addEventListener("click", () => {
  state.targetDistance = THREE.MathUtils.clamp(state.targetDistance - 0.45, 2.25, 10.5);
  el("zoomRange").value = state.targetDistance;
});
el("zoomOut").addEventListener("click", () => {
  state.targetDistance = THREE.MathUtils.clamp(state.targetDistance + 0.45, 2.25, 10.5);
  el("zoomRange").value = state.targetDistance;
});

el("fileInput").addEventListener("change", () => {
  const files = Array.from(el("fileInput").files || []);
  el("fileLabel").textContent = files.length ? `${files.length} Datei(en) ausgewaehlt` : "Dateien hier ablegen oder auswaehlen";
});
el("dropzone").addEventListener("dragover", (event) => event.preventDefault());
el("dropzone").addEventListener("drop", (event) => {
  event.preventDefault();
  el("fileInput").files = event.dataTransfer.files;
  el("fileInput").dispatchEvent(new Event("change"));
});
el("memoryForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const data = await uploadFormData(event.currentTarget);
  const response = await fetch("/api/memories", { method: "POST", body: data });
  if (!response.ok) {
    alert(`Die Erinnerung konnte nicht gespeichert werden.\n${await response.text()}`);
    return;
  }
  const memory = await response.json().catch(() => null);
  event.currentTarget.reset();
  el("fileLabel").textContent = "Dateien hier ablegen oder auswaehlen";
  await loadMemories();
  if (memory?.id) goToMemory(memory.id, { openStation: true });
});

setView("world");
connectEvents();
loadMemories();
animate();
</script>
</body>
</html>
